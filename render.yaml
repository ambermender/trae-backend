services:
  - type: web
    name: trae-backend
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: trae-database
          property: connectionString

databases:
  - name: trae-database
    plan: free
    databaseName: trae_db